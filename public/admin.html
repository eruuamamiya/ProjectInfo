<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - NekoGanz</title>
        <style>
        /* Skema Warna Utama */
        :root {
            --bg-body: #f0f4f8; /* Biru keabu-abuan terang */
            --bg-card: #ffffff;
            --primary: #6366f1; /* Biru ungu modern */
            --primary-hover: #4f46e5;
            --accent: #10b981; /* Hijau zamrud */
            --accent-hover: #059669;
            --danger: #ef4444; /* Merah untuk tombol hapus */
            --danger-hover: #dc2626;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            padding: 40px 20px;
            color: var(--text-main);
            margin: 0;
            /* Tambahan efek gradasi tipis di background */
            background-image: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
        }
        
        .admin-container {
            max-width: 600px;
            margin: auto;
            background: var(--bg-card);
            padding: 40px 30px;
            border-radius: 20px; /* Sudut lebih membulat */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); /* Bayangan lebih lembut */
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 { 
            margin-top: 0; 
            border-bottom: 2px solid #e2e8f0; 
            padding-bottom: 15px;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
        }
        
        input[type="text"], input[type="url"] {
            width: 100%; 
            padding: 12px 15px;
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            box-sizing: border-box;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input[type="text"]:focus, input[type="url"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background-color: #fff;
        }

        button {
            background-color: var(--accent); 
            color: #fff; 
            border: none;
            padding: 12px 20px; 
            font-size: 1rem; 
            cursor: pointer;
            border-radius: 10px; 
            width: 100%; 
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        button:hover { 
            background-color: var(--accent-hover); 
            transform: translateY(-2px); /* Efek melayang sedikit */
        }
        
        .list-container { margin-top: 40px; }
        
        .list-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #f8fafc; 
            padding: 15px 20px; 
            margin-bottom: 12px; 
            border-radius: 12px;
            border-left: 4px solid var(--primary); /* Garis warna di sebelah kiri */
            transition: transform 0.2s ease;
        }
        
        .list-item:hover {
            transform: translateX(5px); /* Efek geser saat disorot */
            background: #f1f5f9;
        }

        .list-item-text { flex: 1; padding-right: 15px; }
        
        .list-item-text strong { 
            display: block; 
            font-size: 1.1rem; 
            color: var(--text-main);
            margin-bottom: 4px;
        }
        
        .list-item-text small { 
            color: var(--text-muted); 
            word-break: break-all;
        }
        
        .btn-hapus {
            background-color: var(--danger); 
            width: auto; 
            padding: 8px 16px; 
            font-size: 0.85rem;
            border-radius: 8px;
        }
        
        .btn-hapus:hover { 
            background-color: var(--danger-hover); 
            transform: scale(1.05); /* Efek membesar */
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>Tambah Link Baru</h2>
        <form id="addForm">
            <div class="form-group">
                <label>Judul Link</label>
                <input type="text" id="name" placeholder="Contoh: Portofolio Web" required>
            </div>
            <div class="form-group">
                <label>URL (Link)</label>
                <input type="url" id="url" placeholder="https://..." required>
            </div>
            <div class="form-group">
                <label>Deskripsi (Opsional)</label>
                <input type="text" id="desc" placeholder="Keterangan singkat...">
            </div>
            <button type="submit">Tambah ke List</button>
        </form>

        <div class="list-container">
            <h2>Daftar Link Saat Ini</h2>
            <div id="adminList">Memuat...</div>
        </div>
    </div>

    <script>
        async function loadAdminList() {
            const listDiv = document.getElementById('adminList');
            try {
                const response = await fetch('/api/projects');
                const data = await response.json();
                listDiv.innerHTML = '';
                
                if(data.length === 0) {
                    listDiv.innerHTML = '<p>Data masih kosong.</p>';
                }

                data.forEach(proj => {
                    listDiv.innerHTML += `
                        <div class="list-item">
                            <div class="list-item-text">
                                <strong>${proj.name}</strong>
                                <small>${proj.url}</small>
                            </div>
                            <button class="btn-hapus" onclick="deleteLink('${proj.id}')">Hapus</button>
                        </div>
                    `;
                });
            } catch (error) {
                listDiv.innerHTML = '<p>Gagal memuat list.</p>';
            }
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const url = document.getElementById('url').value;
            const description = document.getElementById('desc').value;

            await fetch('/api/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, url, description })
            });

            document.getElementById('addForm').reset();
            loadAdminList(); // Refresh list
        });

        async function deleteLink(id) {
            if(confirm('Yakin ingin menghapus link ini?')) {
                await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                loadAdminList();
            }
        }

        loadAdminList();
    </script>
</body>
</html>
