<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects | NekoGanz</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333;
            --btn-bg: #f3f3f3;
            --btn-hover: #e0e0e0;
            --accent: #39e09b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* PERBAIKAN CSS FOTO PROFIL */
        .profile-img {
            width: 96px;
            height: 96px;
            background-color: #ddd;
            border-radius: 50%;
            margin-bottom: 15px;
            display: inline-block;
            object-fit: cover; /* Mencegah foto jadi gepeng */
            border: 3px solid var(--accent); /* Garis tepi warna hijau */
        }

        h1 { font-size: 1.2rem; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 30px; }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background-color: var(--btn-bg);
            padding: 18px;
            border-radius: 50px;
            text-decoration: none; 
            color: var(--text-color);
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            border: 2px solid transparent;
            display: block; 
        }

        .link-card:hover {
            transform: scale(1.02);
            background-color: var(--btn-hover);
            border-color: var(--text-color);
        }

        .description {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            display: block;
            font-weight: normal;
        }

        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer a {
            color: var(--text-color);
            transition: transform 0.2s;
        }

        .footer a:hover {
            transform: scale(1.1);
        }

        .footer svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }
    </style>
</head>
<body>

        <h1>Neko Developer</h1>
        <p class="subtitle">Beginner developer</p>

    <script>
        async function fetchProjects() {
            const listDiv = document.getElementById('projectList');
            try {
                const response = await fetch('/api/projects');
                const data = await response.json();
                
                listDiv.innerHTML = '';
                
                if(data.length === 0) {
                    listDiv.innerHTML = '<p style="color: #888;">Belum ada link yang ditambahkan.</p>';
                    return;
                }

                data.forEach(proj => {
                    listDiv.innerHTML += `
                        <a href="${proj.url}" target="_blank" class="link-card">
                            ${proj.name}
                            ${proj.description ? `<span class="description">${proj.description}</span>` : ''}
                        </a>
                    `;
                });
            } catch (error) {
                listDiv.innerHTML = '<p style="color: red;">Gagal memuat list...</p>';
            }
        }
        fetchProjects();
    </script>
</body>
